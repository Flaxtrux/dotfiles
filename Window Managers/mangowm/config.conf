# ------------------------------------------------------------
# Controles básicos
# ------------------------------------------------------------
bind=ALT,Return,spawn,foot
bind=ALT,d,spawn,wmenu-run -l 10
bind=ALT,w,killclient,
bind=ALT,r,reload_config,
bind=ALT+SHIFT,f,spawn,thunar

# Recargar Waybar (rebar.sh)
bind=ALT+SHIFT,r,spawn,~/.config/mango/rebar.sh

# Captura de pantalla (necesitas el script snip en PATH)
bind=ALT,s,spawn,snip

# ------------------------------------------------------------
# Gestión de workspaces / tags
# ------------------------------------------------------------
bind=ALT,1,view,1
bind=ALT,2,view,2
bind=ALT,3,view,3
bind=ALT,4,view,4
bind=ALT,5,view,5
bind=ALT,6,view,6
bind=ALT,7,view,7
bind=ALT,8,view,8
bind=ALT,9,view,9

# Vista general (overview) de todos los workspaces
bind=ALT,0,toggleoverview,

# Aumentar / reducir ventanas en zona master
bind=ALT,i,incnmaster,1
bind=ALT,p,incnmaster,-1

# ------------------------------------------------------------
# Gestión de ventanas — foco
# ------------------------------------------------------------
bind=ALT,Down,focusstack,next
bind=ALT,Up,focusstack,previous
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT+SHIFT,Down,exchange_client,down
bind=ALT+SHIFT,Up,exchange_client,up
bind=ALT+SHIFT,Left,exchange_client,left
bind=ALT+SHIFT,Right,exchange_client,right

# ------------------------------------------------------------
# Layouts
# ------------------------------------------------------------
bind=ALT,n,switch_layout,
bind=ALT,a,togglegaps,
bind=ALT,t,togglefloating,
bind=ALT,f,togglefullscreen,


# ------------------------------------------------------------
# Ratón — mover y redimensionar ventanas flotantes
# ------------------------------------------------------------
mousebind=ALT,btn_left,moveresize,curmove
mousebind=ALT,btn_right,moveresize,curresize

# ------------------------------------------------------------
# Gestos táctiles (touchpad)
# ------------------------------------------------------------
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client,
gesturebind=none,right,4,viewtoright_have_client,
gesturebind=none,up,4,toggleoverview,
gesturebind=none,down,4,toggleoverview,

# ------------------------------------------------------------
# Reglas
# ------------------------------------------------------------
xkb_rules_layout=es
monitorrule=name:Virtual-1,width:1920,height:1080,refresh:60,x:0,y:0,scale:1

# ------------------------------------------------------------
# Ejecutar al inicio
# ------------------------------------------------------------
exec-once=waybar -c ~/.config/mango/config.jsonc -s ~/.config/mango/style.css
exec-once=swaybg -i ~/walls/wall1.png

# ------------------------------------------------------------
# Animaciones
# ------------------------------------------------------------
animations=0
layer_animations=0
sloppyfocus=1

# ------------------------------------------------------------
# Temas
# ------------------------------------------------------------
env=GTK_THEME,Adwaita:dark
