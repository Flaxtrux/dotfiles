# ------------------------------------------------------------
# Controles básicos
# ------------------------------------------------------------
bind=SUPER,Return,spawn,foot
bind=SUPER,d,spawn,wmenu-run -l 10
bind=SUPER,w,killclient,
bind=SUPER,r,reload_config,
bind=SUPER+SHIFT,f,spawn,thunar
bind=SUPER+SHIFT,Return,spawn,firefox

# Recargar Waybar (rebar.sh)
bind=SUPER+SHIFT,r,spawn,~/.config/mango/rebar.sh

# Captura de pantalla (necesitas el script snip en PATH)
bind=SUPER,s,spawn,snip

# ------------------------------------------------------------
# Gestión de workspaces / tags
# ------------------------------------------------------------
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

# Vista general (overview) de todos los workspaces
bind=SUPER,0,toggleoverview,

# Aumentar / reducir ventanas en zona master
bind=SUPER,i,incnmaster,1
bind=SUPER,p,incnmaster,-1

# ------------------------------------------------------------
# Gestión de ventanas — foco
# ------------------------------------------------------------
bind=SUPER,Down,focusstack,next
bind=SUPER,Up,focusstack,previous
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# ------------------------------------------------------------
# Layouts
# ------------------------------------------------------------
bind=SUPER,n,switch_layout,
bind=SUPER,a,togglegaps,
bind=SUPER,t,togglefloating,
bind=SUPER,f,togglefullscreen,


# ------------------------------------------------------------
# Ratón — mover y redimensionar ventanas flotantes
# ------------------------------------------------------------
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# ------------------------------------------------------------
# Gestos táctiles (touchpad)
# ------------------------------------------------------------
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client,
gesturebind=none,right,4,viewtoright_have_client,
gesturebind=none,up,4,toggleoverview,
gesturebind=none,down,4,toggleoverview,

# ------------------------------------------------------------
# Reglas
# ------------------------------------------------------------
xkb_rules_layout=es
monitorrule=name:Virtual-1,width:1920,height:1080,refresh:60,x:0,y:0,scale:1

# ------------------------------------------------------------
# Ejecutar al inicio
# ------------------------------------------------------------
exec-once=killall waybar; waybar -c ~/.config/mango/config.jsonc -s ~/.config/mango/style.css
exec-once=swaybg -i ~/walls/wall1.png

# ------------------------------------------------------------
# Animaciones
# ------------------------------------------------------------
animations=0
layer_animations=0
sloppyfocus=1

# ------------------------------------------------------------
# Temas
# ------------------------------------------------------------
env=GTK_THEME,Adwaita:dark
